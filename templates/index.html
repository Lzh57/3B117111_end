{% extends 'base.html' %}
{% block title %}首頁 - 客戶管理系統{% endblock %}
{% block content %}
<article>
    <hgroup>
        <h1>客戶管理系統</h1>
        <p>Flask-WTF + SQLite 期末考作業</p>
    </hgroup>
    <p>本系統提供客戶資料的新增、查詢、編輯與刪除功能，並具備登入驗證機制，所有資料儲存於 SQLite 資料庫中。</p>
    {% if session.username %}
        <a href="{{ url_for('customer_list') }}" role="button">前往客戶列表</a>
    {% else %}
        <a href="{{ url_for('login') }}" role="button">前往登入</a>
    {% endif %}
</article>
{% endblock %}
